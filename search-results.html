<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Результати пошуку | Rail MATE</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">

  <style>
    /* Специфічні стилі для пошуку */
    .search-header {
      background-color: var(--color-primary-blue);
      color: var(--color-primary-white);
      padding: 24px 0;
    }
    
    .search-header-flex {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .search-params {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 1.5rem;
      font-weight: 700;
    }
    
    .search-params-date {
      font-size: 1rem;
      font-weight: 500;
      opacity: 0.9;
    }

    .search-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 32px;
      margin-top: 32px;
    }

    .filters-panel {
      background-color: var(--color-primary-white);
      border-radius: var(--radius-md);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      height: fit-content;
      border: 1px solid var(--color-border);
    }
    
    .filter-group {
      margin-bottom: 24px;
    }
    
    .filter-group:last-child {
      margin-bottom: 0;
    }
    
    .filter-title {
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .filter-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      cursor: pointer;
    }
    
    .filter-checkbox input {
      width: 18px;
      height: 18px;
      accent-color: var(--color-primary-blue);
    }

    /* Стилі для train-card покращення */
    .train-class {
      transition: border-color var(--transition-fast), background-color var(--transition-fast);
      cursor: pointer;
    }
    
    .train-class:hover {
      border-color: var(--color-primary-blue);
      background-color: rgba(137, 207, 240, 0.05);
    }
    
    .train-class.selected {
      border-color: var(--color-accent-orange);
      background-color: rgba(255, 127, 80, 0.05);
    }

    @media (max-width: 768px) {
      .search-layout {
        grid-template-columns: 1fr;
        gap: 24px;
      }
      .search-header-flex {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <!-- Шапка -->
    <header class="header">
      <div class="container">
        <a href="index.html" class="header__logo">
          <i class="ph-fill ph-train"></i>
          Rail MATE
        </a>
        <input type="checkbox" id="burger-toggle" class="burger-toggle">
        <label for="burger-toggle" class="burger-icon"><i class="ph ph-list"></i></label>
        <nav class="header__nav">
          <a href="index.html" class="header__nav-link">Головна</a>
          <a href="#" class="header__nav-link">Мої квитки</a>
          <a href="#" class="header__nav-link">Допомога</a>
          <button class="btn btn--outline">
            <i class="ph ph-user"></i> Увійти
          </button>
        </nav>
      </div>
    </header>

    <!-- Основний контент -->
    <main>
      <div class="search-header">
        <div class="container search-header-flex">
          <div>
            <div id="search-params-text" class="search-params">
              Київ <i class="ph ph-arrow-right"></i> Львів
            </div>
            <div id="search-params-date-text" class="search-params-date">
              24 Липня 2026, 1 пасажир
            </div>
          </div>
          <a href="index.html" class="btn btn--primary" style="background-color: var(--color-primary-white); color: var(--color-primary-blue); box-shadow: none;">
            Змінити пошук
          </a>
        </div>
      </div>

      <div class="container search-layout">
        <!-- Фільтри -->
        <aside class="filters-panel">
          <div class="filter-group">
            <div class="filter-title">
              Тип потяга
              <i class="ph ph-caret-down"></i>
            </div>
            <label class="filter-checkbox">
              <input type="checkbox" id="filter-intercity" value="intercity" checked>
              <span>Інтерсіті+</span>
            </label>
            <label class="filter-checkbox">
              <input type="checkbox" id="filter-night" value="night" checked>
              <span>Швидкий нічний</span>
            </label>
          </div>
        </aside>

        <!-- Результати -->
        <div id="results-list-container" class="results-list">
          <h2 id="results-count" style="font-size: 1.25rem; margin-bottom: 24px;">Завантаження...</h2>
          <!-- JS CONTENT -->
        </div>
      </div>
    </main>

    <!-- Підвал (скорочений) -->
    <footer class="footer" style="margin-top: 60px;">
      <div class="container">
        <div class="footer__bottom" style="border: none; padding-top: 0;">
          &copy; 2026 Rail MATE.
        </div>
      </div>
    </footer>
  </div>
  <!-- Скрипти -->
  <script src="js/dataService.js"></script>
  <script src="js/results.js"></script>
</body>
</html>
