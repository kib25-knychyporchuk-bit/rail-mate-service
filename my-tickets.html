<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rail MATE - Мої квитки</title>

  <!-- Шрифти -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Іконки (Phosphor Icons) -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- Стилі -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">

  <style>
    .tickets-container {
      max-width: 800px;
      margin: 0 auto;
    }

    .ticket-card {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 24px;
      padding: 24px;
      border-left: 4px solid var(--color-primary-blue);
    }

    .ticket-card__header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px dashed var(--color-border);
      padding-bottom: 16px;
    }

    .ticket-card__route {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--color-text-main);
    }

    .ticket-card__id {
      font-size: 0.9rem;
      color: var(--color-text-muted);
    }

    .ticket-card__details {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .ticket-card__detail-item {
      display: flex;
      flex-direction: column;
    }

    .ticket-card__detail-label {
      font-size: 0.85rem;
      color: var(--color-text-muted);
      margin-bottom: 4px;
    }

    .ticket-card__detail-value {
      font-weight: 600;
      color: var(--color-text-main);
    }

    .ticket-empty {
      text-align: center;
      padding: 64px 24px;
      background: var(--color-primary-white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
    }

    .ticket-empty i {
      font-size: 4rem;
      color: var(--color-border);
      margin-bottom: 16px;
    }
  </style>
</head>

<body>
  <div class="page-wrapper">
    <!-- Шапка -->
    <header class="header">
      <div class="container">
        <a href="index.html" class="header__logo">
          <i class="ph-fill ph-train"></i>
          Rail MATE
        </a>
        <input type="checkbox" id="burger-toggle" class="burger-toggle">
        <label for="burger-toggle" class="burger-icon"><i class="ph ph-list"></i></label>
        <nav class="header__nav" id="header-nav">
          <a href="index.html" class="header__nav-link">Головна</a>
          <a href="my-tickets.html" class="header__nav-link" id="nav-my-tickets"
            style="color: var(--color-primary-blue); font-weight: 600;">Мої квитки</a>
          <button class="btn btn--outline" id="nav-login-btn">
            <i class="ph ph-user"></i> Увійти
          </button>
        </nav>
      </div>
    </header>

    <main>
      <div class="container section tickets-container">
        <h1 style="font-size: 2rem; margin-bottom: 32px;">Мої квитки</h1>

        <div id="tickets-list">
          <!-- JS CONTENT -->
        </div>
      </div>
    </main>

    <!-- Підвал -->
    <footer class="footer" style="margin-top: 60px;">
      <div class="container">
        <div class="footer__bottom" style="border: none; padding-top: 0;">
          &copy; 2026 Rail MATE. Усі права захищені.
        </div>
      </div>
    </footer>
  </div>

  <!-- Скрипти -->
  <script src="js/dataService.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/tickets.js"></script>
</body>

</html>
